<button
  type="button"
  class="theme-toggle"
  [class.theme-toggle--dark]="isDark()"
  (click)="toggle()"
  [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
  [attr.aria-pressed]="isDark()"
>
  <span class="theme-toggle__track" aria-hidden="true">
    <span class="theme-toggle__thumb"></span>

    <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
      <path
        d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      />
    </svg>

    <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none">
      <path
        d="M21 14.5A8.5 8.5 0 1111.5 4a6.5 6.5 0 1010.5 10.5z"
        stroke="currentColor"
        stroke-width="2"
        stroke-linejoin="round"
      />
    </svg>
  </span>
</button>
